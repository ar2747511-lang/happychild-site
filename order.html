<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commander | Happy Child</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>Commander</h2>

<form id="orderForm">

<label>Nom</label>
<input id="name" type="text" placeholder="Votre nom" required>

<label>Téléphone</label>
<input id="phone" type="tel" placeholder="+212..." required>

<label>Ville</label>
<input id="city" type="text" placeholder="Casablanca">

<label>Adresse</label>
<input id="address" type="text" placeholder="Adresse complète">

<br><br>

<button type="submit">Envoyer la commande</button>

</form>

<script type="module" src="js/order.js"></script>

</body>
</html>
