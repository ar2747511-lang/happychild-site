<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Happy Child</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h2>Admin Dashboard</h2>

  <!-- Login -->
  <div id="loginBox">
    <p><b>Login</b></p>
    <input id="adminEmail" type="email" placeholder="Email" />
    <input id="adminPass" type="password" placeholder="Password" />
    <button id="btnLogin">Login</button>
    <p id="loginMsg"></p>
  </div>

  <!-- Panel -->
  <div id="adminPanel" style="display:none;">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button id="btnLogout">Logout</button>

      <input id="searchInput" type="text" placeholder="Search: name / phone / city" style="flex:1;min-width:220px;" />

      <select id="statusFilter">
        <option value="ALL">All statuses</option>
        <option value="NEW">New</option>
        <option value="CONFIRMED">Confirmed</option>
        <option value="DELIVERED">Delivered</option>
        <option value="CANCELED">Canceled</option>
      </select>

      <span id="stats" style="font-size:13px;color:#555;"></span>
    </div>

    <hr/>

    <div id="ordersList">Loading...</div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
